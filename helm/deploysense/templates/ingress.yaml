# DeploySense — Ingress (NGINX Ingress Controller)
#
# WHY Ingress:
#   - Single entry point for all external traffic
#   - TLS termination
#   - Path-based routing (all traffic goes to API Service)
#   - Rate limiting (via annotations)
#
# TRADEOFF: We use NGINX Ingress, not Istio/Linkerd.
# Service mesh is overkill for 3 services. NGINX Ingress
# handles our routing, TLS, and rate limiting needs.

{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deploysense-ingress
  namespace: {{ .Values.global.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: deploysense-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: {{ .Values.apiService.port }}
{{- end }}
