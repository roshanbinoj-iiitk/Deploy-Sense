# Alembic Configuration — DeploySense
#
# This file is used by Alembic for database migrations.
# See: https://alembic.sqlalchemy.org/en/latest/

[alembic]
script_location = alembic
sqlalchemy.url = postgresql://deploysense:deploysense_dev@localhost:5432/deploysense

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
